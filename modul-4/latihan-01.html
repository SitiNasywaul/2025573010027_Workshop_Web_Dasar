<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Grid</title>
  <link rel="stylesheet" href="latihan-01.css">
</head>
<body>

<div class="container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Sidebar</h2>
    <ul>
      <li>Dashboard</li>
      <li>Users</li>
      <li>Settings</li>
    </ul>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="header">Header</header>

    <!-- Statistik -->
    <section class="stats">
      <div class="card">Stat 1</div>
      <div class="card">Stat 2</div>
      <div class="card">Stat 3</div>
      <div class="card">Stat 4</div>
    </section>

    <!-- Table + Chart -->
    <section class="content">
      <div class="table">Table Area</div>
      <div class="chart">Chart Area</div>
    </section>
  </main>
</div>

</body>
</html>
