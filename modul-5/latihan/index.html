<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pink Scoop 🍦</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: #fff0f5;
        transition: all 0.3s ease;
      }

      .dark {
        background-color: #111827;
        color: white;
      }

      .font-cute {
        font-family: "Pacifico", cursive;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav
      class="flex justify-between items-center px-6 py-4 bg-pink-300 text-white"
    >
      <h1 class="font-cute text-xl">Pink Scoop 🍓</h1>

      <div class="flex items-center gap-5">
        <ul class="flex gap-4 font-bold">
          <li><a href="#">Home</a></li>
          <li><a href="#">Menu</a></li>
          <li><a href="#">Promo</a></li>
          <li><a href="#">Kontak</a></li>
        </ul>

        <!-- Toggle Dark Mode -->
        <label class="flex items-center cursor-pointer">
          <input type="checkbox" id="darkToggle" class="hidden" />
          <div class="w-12 h-6 bg-pink-200 rounded-full p-1 flex items-center">
            <div
              id="toggleCircle"
              class="w-4 h-4 bg-white rounded-full shadow-md transform duration-300"
            ></div>
          </div>
        </label>
      </div>
    </nav>

    <!-- Cart -->
    <div id="cart" class="mx-5 mt-6 p-3 bg-pink-100 rounded-xl font-bold">
      🛒 Keranjang: <span id="cart-count">0</span> item | Total: Rp
      <span id="cart-total">0</span>
    </div>

    <!-- BUTTON CHECKOUT -->
    <div class="mx-5 mt-8 mb-10 flex justify-center">
      <button
        onclick="checkoutWA()"
        class="relative px-6 py-2 bg-pink-400 hover:bg-pink-500 active:scale-95 text-white rounded-full text-xs font-bold transition-all shadow-lg hover:shadow-pink-300 hover:scale-110 flex items-center gap-2 overflow-hidden"
      >
        <span class="animate-bounce">🍦</span>
        Checkout
        <span class="animate-bounce">💖</span>

        <!-- sparkle efek -->
        <span class="absolute -top-1 left-3 text-white animate-ping">✨</span>
        <span class="absolute bottom-0 right-4 text-white animate-ping"
          >✨</span
        >
      </button>
    </div>

    <!-- Hero -->
    <section
      class="text-center py-20 px-5 text-white rounded-b-3xl bg-gradient-to-r from-pink-300 to-pink-500"
    >
      <h2 class="font-cute text-4xl">Ice Cream Manis & Segar 🍦</h2>
      <p>Nikmati scoop terbaik dengan rasa premium</p>
    </section>

    <!-- Menu -->
    <h2 class="text-center text-pink-500 text-3xl mt-10 font-cute">
      Menu Favorit 🍨
    </h2>

    <div class="flex justify-center gap-5 p-5 flex-wrap">
      <!-- Card 1 -->
      <div class="bg-white p-5 rounded-2xl text-center w-52 shadow-lg">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQnhwRDdoI8yFUfYvIcQBLEIUZ5kNdlcEJFPg&s"
          class="rounded-xl"
        />
        <h3>Strawberry 🍓</h3>
        <p>Rp 15.000</p>
        <button
          class="buy-btn mt-2 px-4 py-2 bg-pink-500 text-white rounded-full"
          data-price="15000"
        >
          Beli
        </button>
      </div>

      <!-- Card 2 -->
      <div class="bg-white p-5 rounded-2xl text-center w-52 shadow-lg">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSjnyMIgQ1Dw-uI9F_qlqDYF1bBCPLVciCCtw&s"
          class="rounded-xl"
        />
        <h3>Chocolate 🍫</h3>
        <p>Rp 18.000</p>
        <button
          class="buy-btn mt-2 px-4 py-2 bg-pink-500 text-white rounded-full"
          data-price="18000"
        >
          Beli
        </button>
      </div>

      <!-- Card 3 -->
      <div class="bg-white p-5 rounded-2xl text-center w-52 shadow-lg">
        <img
          src="https://t4.ftcdn.net/jpg/02/43/64/83/360_F_243648377_bVew0j07WgxutNMX1KJkkptiT49P1C0S.jpg"
          class="rounded-xl"
        />
        <h3>Vanilla 🍦</h3>
        <p>Rp 14.000</p>
        <button
          class="buy-btn mt-2 px-4 py-2 bg-pink-500 text-white rounded-full"
          data-price="14000"
        >
          Beli
        </button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="text-center p-5 bg-pink-300 text-white mt-10">
      © 2026 Pink Scoop
    </footer>

    <!-- konten HTML kamu di atas -->

    <!-- FOOTER -->
    <footer>...</footer>

    <style>
      .icecream {
        position: fixed;
        top: -50px;
        font-size: 30px;
        z-index: 999999;
        pointer-events: none;
        animation: fall 4s linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh);
          opacity: 0;
        }
      }
    </style>

    <script>
      function spawnIceCream() {
        const ice = document.createElement("div");

        const emojis = ["🍦", "🍨", "🍧", "🍓", "🍫", "🍩"];
        ice.innerText = emojis[Math.floor(Math.random() * emojis.length)];

        ice.className = "icecream";

        ice.style.left = Math.random() * window.innerWidth + "px";

        document.body.appendChild(ice);

        setTimeout(() => ice.remove(), 5000);
      }

      setInterval(spawnIceCream, 300);
    </script>

    <!-- SCRIPT -->
    <script>
      // DARK MODE
      const toggle = document.getElementById("darkToggle");
      const circle = document.getElementById("toggleCircle");

      if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark");
        toggle.checked = true;
        circle.classList.add("translate-x-6");
      }

      toggle.addEventListener("change", () => {
        document.body.classList.toggle("dark");

        if (toggle.checked) {
          circle.classList.add("translate-x-6");
          localStorage.setItem("darkMode", "true");
        } else {
          circle.classList.remove("translate-x-6");
          localStorage.setItem("darkMode", "false");
        }
      });

      // CART
      let total = 0;
      let count = 0;

      const buttons = document.querySelectorAll(".buy-btn");
      const cartCount = document.getElementById("cart-count");
      const cartTotal = document.getElementById("cart-total");

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const price = parseInt(btn.dataset.price);

          total += price;
          count++;

          cartCount.textContent = count;
          cartTotal.textContent = total.toLocaleString("id-ID");

          // animasi tombol
          btn.innerText = "✔ Ditambahkan";
          btn.classList.add("bg-green-500");

          setTimeout(() => {
            btn.innerText = "Beli";
            btn.classList.remove("bg-green-500");
            btn.classList.add("bg-pink-500");
          }, 1000);
        });
      });

      function checkoutWA() {
        let pesan = `Halo Pink Scoop 🍦\nTotal item: ${count}\nTotal harga: Rp ${total.toLocaleString("id-ID")}`;
        let nomor = "6281234567890";

        window.open(`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`);
      }
    </script>
  </body>
</html>
