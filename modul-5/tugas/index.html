<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodieHub</title>

    <!-- Tailwind CDN (INI KUNCI BIAR LANGSUNG JALAN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>

  <body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white">
    <!-- Navbar -->
    <header
      class="flex justify-between items-center p-4 bg-orange-500 text-white"
    >
      <h1 class="text-xl font-bold">🍽️ FoodieHub</h1>
      <div class="flex gap-4">
        <button onclick="toggleDark()">🌙</button>
      </div>
    </header>

    <!-- Hero -->
    <section class="text-center py-16">
      <h2 class="text-3xl font-bold mb-3">Fresh & Tasty Food 🍔</h2>
      <p class="mb-4">Order your favorite meals anytime</p>
      <a
        href="#menu"
        class="inline-block bg-orange-500 text-white px-6 py-3 rounded-lg hover:bg-orange-600 transition"
        >Order Now</a
      >
    </section>

    <!-- Menu -->
    <section id="menu" class="text-center">
      <h2 class="text-2xl font-bold mb-6">Our Menu</h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 px-10">
        <div class="bg-white shadow-lg p-4 rounded">
          <img
            src="https://blog.tokowahab.com/wp-content/uploads/2024/04/Cara-Membuat-Resep-Cheese-Burger-Rumahan-Empuk-Juicy-Banget.jpg"
            class="mx-auto mb-2 w-full h-40 object-cover rounded"
          />
          <h3>Burger</h3>
          <p class="text-orange-500">Rp 20.000</p>
        </div>

        <div class="bg-white shadow-lg p-4 rounded h-full">
          <img
            src="https://www.electrolux.co.id/globalassets/5-support/blog-id/27.jpg"
            class="mx-auto mb-2 w-full h-40 object-cover rounded"
          />
          <h3>Pizza</h3>
          <p class="text-orange-500">Rp 35.000</p>
        </div>

        <div class="bg-white shadow-lg p-4 rounded">
          <img
            src="https://thestayathomechef.com/wp-content/uploads/2025/06/Eggless-Spaghetti-Carbonara-4-1200x720.jpg"
            class="mx-auto mb-2 w-full h-40 object-cover rounded"
          />
          <h3>Pasta</h3>
          <p class="text-orange-500">Rp 25.000</p>
        </div>
      </div>
    </section>

    <script>
      function toggleDark() {
        document.documentElement.classList.toggle("dark");
      }
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
