<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #d3d3d3;
        font-family: sans-serif;
      }

      .calculator {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 20px;
        width: 260px;
      }

      .display {
        background: black;
        color: #00ff00;
        font-size: 40px;
        text-align: right;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        padding: 18px;
        border: none;
        border-radius: 12px;
        background: #444;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.15s;
      }

      button:active {
        transform: scale(0.95);
      }

      .operator {
        background: #ff9500;
      }

      .clear {
        background: #e63946;
        grid-column: span 2;
      }

      .equal {
        background: #2ea043;
        grid-column: span 2;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <div class="display" id="display">0</div>

      <div class="buttons" id="buttons">
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="operator" data-action="operator" data-value="/">
          ÷
        </button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="operator" data-action="operator" data-value="*">
          ×
        </button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="operator" data-action="operator" data-value="-">
          −
        </button>

        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button class="operator" data-action="operator" data-value="+">
          +
        </button>

        <button class="clear" data-action="clear">C</button>
        <button class="equal" data-action="equals">=</button>
      </div>
    </div>

    <script src="latihan-1.js"></script>
  </body>
</html>
